name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --filter @workspace/shine...
      - name: Build Shine
        run: pnpm --filter @workspace/shine run build
        env:
          PORT: 3000
          BASE_PATH: /Shine/
          NODE_ENV: production
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/shine/dist/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
